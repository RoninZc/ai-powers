version: "3.9"

services:
  mcp-atlassian:
    image: mcp-atlassian:latest
    container_name: mcp-atlassian
    restart: unless-stopped
    environment:
      - TOOLSETS=all
      - ATLASSIAN_OAUTH_ENABLE=true
      - CONFLUENCE_URL=
    command: >
      --transport streamable-http --port 9000
    ports:
      - "9000:9000"

  mcp-clickhouse:
    image: mcp/clickhouse:latest
    container_name: mcp-clickhouse
    depends_on:
      - clickhouse
    environment:
      CLICKHOUSE_HOST: clickhouse
      CLICKHOUSE_PORT: 8123
      CLICKHOUSE_USER: default
      CLICKHOUSE_PASSWORD: clickhouse
      CLICKHOUSE_DATABASE: default
      CLICKHOUSE_MCP_SERVER_TRANSPORT: http
      CLICKHOUSE_MCP_BIND_HOST: 0.0.0.0
      CLICKHOUSE_MCP_BIND_PORT: 9001
    ports:
      - "9001:9001"

  mcp-dbhub:
    image: bytebase/dbhub:latest
    container_name: mcp_dbhub
    restart: unless-stopped
    command:
      - --transport=http
      - --port=9002
      - --config=/config/config.toml
      - --read-only
    volumes:
      - ./config/dbhub/config.toml:/config/config.toml:ro
    ports:
      - "9002:9002"

volumes:
  clickhouse_data:
